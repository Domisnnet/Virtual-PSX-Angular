<article class="card">
  <div class="card__media">
    <img
      class="card__img"
      [src]="image"
      [alt]="title"
      width="350"
      height="500"
      loading="lazy"
      decoding="async"
    />
  </div>
  <div class="card__overlay">
    <h3 class="card__title">{{ title }}</h3>
    <p class="card__label">{{ label }}</p>
    <p class="card__price">R$ {{ price.toFixed(2) }}</p>
  </div>
</article>
