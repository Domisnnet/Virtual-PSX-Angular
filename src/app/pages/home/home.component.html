<div class="home">
  <app-header-component></app-header-component>
  <main class="home__main">
    <section class="home__content">
      <div class="cards__grid">
        @for (card of cards; track card.title) {
          <app-card
            [image]="card.image"
            [title]="card.title"
            [label]="card.label"
            [price]="card.price"
          ></app-card>
        }
      </div>
    </section>
  </main>
</div>
